<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e3eaf2"/>
      <stop offset="100%" stop-color="#cdd8e4"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="300" height="300" rx="16" fill="url(#bg)" stroke="#b0bec5" stroke-width="1.5"/>
  <!-- Camera frame -->
  <rect x="20" y="20" width="260" height="260" rx="130" fill="none" stroke="#90a4ae" stroke-width="1" stroke-dasharray="8,4"/>
  <!-- Head -->
  <circle cx="150" cy="95" r="45" fill="#b0bec5" stroke="#90a4ae" stroke-width="1"/>
  <!-- Eyes -->
  <circle cx="135" cy="87" r="4" fill="#607d8b"/>
  <circle cx="165" cy="87" r="4" fill="#607d8b"/>
  <!-- Mouth -->
  <path d="M138 103 Q150 113 162 103" fill="none" stroke="#607d8b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Body -->
  <ellipse cx="150" cy="190" rx="58" ry="44" fill="#b0bec5" stroke="#90a4ae" stroke-width="1"/>
  <!-- Hands -->
  <ellipse cx="100" cy="218" rx="14" ry="10" fill="#c8b89a" stroke="#a89878" stroke-width="0.8" transform="rotate(-10,100,218)"/>
  <ellipse cx="200" cy="218" rx="14" ry="10" fill="#c8b89a" stroke="#a89878" stroke-width="0.8" transform="rotate(10,200,218)"/>
  <!-- Passport booklet being held -->
  <rect x="90" y="205" width="120" height="75" rx="4" fill="#1a3a6e" stroke="#0d2247" stroke-width="1"/>
  <!-- Inner page visible -->
  <rect x="95" y="210" width="110" height="65" rx="2" fill="#f0f3f7"/>
  <!-- Mini photo on passport -->
  <rect x="100" y="215" width="25" height="32" rx="2" fill="#d4dce4"/>
  <circle cx="112" cy="226" r="6" fill="#b0bec5"/>
  <ellipse cx="112" cy="240" rx="8" ry="5" fill="#b0bec5"/>
  <!-- Mini text lines -->
  <rect x="130" y="218" width="65" height="3" rx="1" fill="#cfd8dc"/>
  <rect x="130" y="226" width="55" height="3" rx="1" fill="#cfd8dc"/>
  <rect x="130" y="234" width="60" height="3" rx="1" fill="#cfd8dc"/>
  <rect x="130" y="242" width="45" height="3" rx="1" fill="#cfd8dc"/>
  <!-- Mini MRZ -->
  <rect x="100" y="252" width="100" height="18" rx="1" fill="#f5f5f0"/>
  <rect x="103" y="255" width="94" height="2" rx="0.5" fill="#b0bec5"/>
  <rect x="103" y="260" width="94" height="2" rx="0.5" fill="#b0bec5"/>
  <rect x="103" y="265" width="94" height="2" rx="0.5" fill="#b0bec5"/>
  <!-- Label -->
  <text x="150" y="295" font-family="Arial, sans-serif" font-size="9" fill="#607d8b" text-anchor="middle">Selfie me Pasaporte / Selfie with Passport</text>
  <text x="150" y="16" font-family="Arial, sans-serif" font-size="10" fill="#607d8b" text-anchor="middle">ARLIND KRASNIQI</text>
</svg>