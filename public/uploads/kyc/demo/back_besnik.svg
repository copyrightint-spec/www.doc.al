  <!-- Divider line -->
  <line x1="15" y1="145" x2="385" y2="145" stroke="#90a4ae" stroke-width="0.5"/>
  <!-- MRZ Zone -->
  <rect x="10" y="152" width="380" height="88" rx="4" fill="#f5f5f0"/>
  <text x="20" y="172" font-family="'Courier New', monospace" font-size="11" fill="#37474f" letter-spacing="1">IDALB1234567890&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;</text>
  <text x="20" y="192" font-family="'Courier New', monospace" font-size="11" fill="#37474f" letter-spacing="1">8503155M3006015ALB&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;</text>
  <text x="20" y="212" font-family="'Courier New', monospace" font-size="11" fill="#37474f" letter-spacing="1">SHEHU&lt;&lt;BESNIK&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;</text>
  <text x="200" y="234" font-family="Arial, sans-serif" font-size="7" fill="#90a4ae" text-anchor="middle">Machine Readable Zone</text>
