<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8edf3"/>
      <stop offset="100%" stop-color="#d1dae6"/>
    </linearGradient>
  </defs>
  <!-- Card body -->
  <rect width="400" height="250" rx="12" fill="url(#bg)" stroke="#b0bec5" stroke-width="1.5"/>
  <!-- Top stripe -->
  <rect y="0" width="400" height="6" rx="3" fill="#c41e3a"/>
  <!-- Address section -->
  <text x="20" y="30" font-family="Arial, sans-serif" font-size="7" fill="#78909c">Adresa / Address</text>
  <text x="20" y="44" font-family="Arial, sans-serif" font-size="11" fill="#263238">Rruga Myslym Shyri, Nr. 42</text>
  <text x="20" y="58" font-family="Arial, sans-serif" font-size="11" fill="#263238">Tirane, 1001</text>
  <text x="20" y="72" font-family="Arial, sans-serif" font-size="11" fill="#263238">Shqiperi</text>
  <!-- Issuing authority -->
  <text x="20" y="96" font-family="Arial, sans-serif" font-size="7" fill="#78909c">Autoriteti Leshuese / Issuing Authority</text>
  <text x="20" y="110" font-family="Arial, sans-serif" font-size="10" fill="#263238">Drejtoria e Pergjithshme e Gjendjes Civile</text>
  <!-- Place of birth -->
