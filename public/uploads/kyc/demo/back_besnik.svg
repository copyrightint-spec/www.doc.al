  <text x="250" y="80" font-family="Arial, sans-serif" font-size="11" fill="#263238">A+</text>
  <!-- Barcode placeholder -->
  <rect x="250" y="92" width="130" height="40" rx="2" fill="#fff" stroke="#b0bec5" stroke-width="0.5"/>
  <g fill="#37474f">
    <rect x="258" y="97" width="2" height="30"/><rect x="263" y="97" width="1" height="30"/>
    <rect x="267" y="97" width="3" height="30"/><rect x="273" y="97" width="1" height="30"/>
    <rect x="277" y="97" width="2" height="30"/><rect x="282" y="97" width="1" height="30"/>
    <rect x="286" y="97" width="3" height="30"/><rect x="292" y="97" width="1" height="30"/>
    <rect x="296" y="97" width="2" height="30"/><rect x="301" y="97" width="1" height="30"/>
    <rect x="305" y="97" width="3" height="30"/><rect x="311" y="97" width="2" height="30"/>
    <rect x="316" y="97" width="1" height="30"/><rect x="320" y="97" width="2" height="30"/>
    <rect x="325" y="97" width="3" height="30"/><rect x="331" y="97" width="1" height="30"/>
    <rect x="335" y="97" width="2" height="30"/><rect x="340" y="97" width="1" height="30"/>
    <rect x="344" y="97" width="3" height="30"/><rect x="350" y="97" width="1" height="30"/>
    <rect x="354" y="97" width="2" height="30"/><rect x="359" y="97" width="1" height="30"/>
    <rect x="363" y="97" width="3" height="30"/><rect x="369" y="97" width="2" height="30"/>
    <rect x="374" y="97" width="1" height="30"/>
