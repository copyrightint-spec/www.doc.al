<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e3eaf2"/>
      <stop offset="100%" stop-color="#cdd8e4"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="300" height="300" rx="16" fill="url(#bg)" stroke="#b0bec5" stroke-width="1.5"/>
  <!-- Camera frame -->
  <rect x="20" y="20" width="260" height="260" rx="130" fill="none" stroke="#90a4ae" stroke-width="1" stroke-dasharray="8,4"/>
  <!-- Hair (longer, female style) -->
  <path d="M100 85 Q100 52 150 48 Q200 52 200 85 L200 115 Q200 125 195 128 L195 105 Q195 68 150 65 Q105 68 105 105 L105 128 Q100 125 100 115 Z" fill="#78909c" stroke="none"/>
  <!-- Head -->
  <circle cx="150" cy="95" r="40" fill="#b0bec5" stroke="#90a4ae" stroke-width="1"/>
  <!-- Hair over forehead -->
  <path d="M110 85 Q110 62 150 58 Q190 62 190 85 Q185 72 150 70 Q115 72 110 85" fill="#78909c"/>
  <!-- Eyes with eyelashes -->
  <circle cx="136" cy="90" r="3.5" fill="#607d8b"/>
  <circle cx="164" cy="90" r="3.5" fill="#607d8b"/>
  <path d="M130 87 L133 89" stroke="#546e7a" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M139 89 L142 87" stroke="#546e7a" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M158 87 L161 89" stroke="#546e7a" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M167 89 L170 87" stroke="#546e7a" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Mouth -->
  <path d="M140 106 Q150 114 160 106" fill="none" stroke="#607d8b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Body -->
  <ellipse cx="150" cy="192" rx="55" ry="42" fill="#b0bec5" stroke="#90a4ae" stroke-width="1"/>
  <!-- Hands -->
  <ellipse cx="102" cy="218" rx="13" ry="9" fill="#c8b89a" stroke="#a89878" stroke-width="0.8" transform="rotate(-12,102,218)"/>
  <ellipse cx="198" cy="218" rx="13" ry="9" fill="#c8b89a" stroke="#a89878" stroke-width="0.8" transform="rotate(12,198,218)"/>
  <!-- ID Card being held -->
  <rect x="95" y="208" width="110" height="68" rx="5" fill="#fff" stroke="#90a4ae" stroke-width="1"/>
  <rect x="100" y="213" width="100" height="8" rx="2" fill="#c41e3a" opacity="0.7"/>
  <!-- Mini photo on card -->
  <rect x="104" y="226" width="22" height="27" rx="2" fill="#d4dce4"/>
  <circle cx="115" cy="234" r="5" fill="#b0bec5"/>
  <ellipse cx="115" cy="246" rx="7" ry="5" fill="#b0bec5"/>
  <!-- Mini text lines on card -->
  <rect x="132" y="228" width="58" height="3" rx="1" fill="#cfd8dc"/>
  <rect x="132" y="236" width="50" height="3" rx="1" fill="#cfd8dc"/>
  <rect x="132" y="244" width="44" height="3" rx="1" fill="#cfd8dc"/>
  <rect x="132" y="252" width="54" height="3" rx="1" fill="#cfd8dc"/>
  <!-- Chip on mini card -->
  <rect x="104" y="258" width="14" height="10" rx="2" fill="#c9b037" opacity="0.6"/>
  <!-- Label -->
  <text x="150" y="295" font-family="Arial, sans-serif" font-size="9" fill="#607d8b" text-anchor="middle">Selfie me Dokument / Selfie with ID</text>
  <text x="150" y="16" font-family="Arial, sans-serif" font-size="10" fill="#607d8b" text-anchor="middle">TEUTA BALLA</text>
</svg>