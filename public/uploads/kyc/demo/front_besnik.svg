<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8edf3"/>
      <stop offset="100%" stop-color="#d1dae6"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c41e3a"/>
      <stop offset="100%" stop-color="#a01830"/>
    </linearGradient>
  </defs>
  <!-- Card body -->
  <rect width="400" height="250" rx="12" fill="url(#bg)" stroke="#b0bec5" stroke-width="1.5"/>
  <!-- Header bar -->
  <rect width="400" height="38" rx="12" fill="url(#header)"/>
  <rect y="26" width="400" height="12" fill="url(#header)"/>
  <!-- Albanian double-headed eagle placeholder -->
  <circle cx="28" cy="19" r="13" fill="none" stroke="#ffd700" stroke-width="1.2"/>
  <text x="28" y="23" font-family="Arial, sans-serif" font-size="16" fill="#ffd700" text-anchor="middle">&#9733;</text>
  <!-- Header text -->
  <text x="200" y="16" font-family="Arial, sans-serif" font-size="9" fill="#ffd700" text-anchor="middle" letter-spacing="1.5">REPUBLIKA E SHQIPERISE</text>
  <text x="200" y="30" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="bold" letter-spacing="2">KARTE IDENTITETI</text>
  <!-- Photo placeholder -->
  <rect x="18" y="52" width="95" height="115" rx="4" fill="#cfd8dc" stroke="#90a4ae" stroke-width="1"/>
  <circle cx="65" cy="85" r="20" fill="#b0bec5"/>
  <ellipse cx="65" cy="130" rx="28" ry="22" fill="#b0bec5"/>
  <text x="65" y="160" font-family="Arial, sans-serif" font-size="7" fill="#78909c" text-anchor="middle">FOTO</text>
  <!-- Fields -->
  <text x="128" y="62" font-family="Arial, sans-serif" font-size="7" fill="#78909c">Mbiemri / Surname</text>
  <text x="128" y="75" font-family="Arial, sans-serif" font-size="13" fill="#263238" font-weight="bold">SHEHU</text>
  <text x="128" y="92" font-family="Arial, sans-serif" font-size="7" fill="#78909c">Emri / Name</text>
  <text x="128" y="105" font-family="Arial, sans-serif" font-size="13" fill="#263238" font-weight="bold">BESNIK</text>
  <text x="128" y="122" font-family="Arial, sans-serif" font-size="7" fill="#78909c">Datelindja / Date of Birth</text>
  <text x="128" y="135" font-family="Arial, sans-serif" font-size="11" fill="#263238">15.03.1985</text>
  <text x="128" y="152" font-family="Arial, sans-serif" font-size="7" fill="#78909c">Gjinia / Sex</text>
  <text x="128" y="164" font-family="Arial, sans-serif" font-size="11" fill="#263238">M</text>
  <text x="210" y="152" font-family="Arial, sans-serif" font-size="7" fill="#78909c">Shtetesia / Nationality</text>
  <text x="210" y="164" font-family="Arial, sans-serif" font-size="11" fill="#263238">SHQIPTARE</text>
  <!-- ID Number -->
  <text x="290" y="62" font-family="Arial, sans-serif" font-size="7" fill="#78909c">Nr. Personal</text>
  <text x="290" y="78" font-family="Arial, sans-serif" font-size="14" fill="#c41e3a" font-weight="bold">I12345678A</text>
  <!-- Validity -->
  <text x="18" y="188" font-family="Arial, sans-serif" font-size="7" fill="#78909c">Vlefshme nga / Valid from</text>
  <text x="18" y="200" font-family="Arial, sans-serif" font-size="10" fill="#263238">01.06.2020</text>
  <text x="140" y="188" font-family="Arial, sans-serif" font-size="7" fill="#78909c">Vlefshme deri / Valid until</text>
  <text x="140" y="200" font-family="Arial, sans-serif" font-size="10" fill="#263238">01.06.2030</text>
  <!-- Chip placeholder -->
  <rect x="18" y="212" width="40" height="28" rx="4" fill="#c9b037" stroke="#a08c2e" stroke-width="0.8"/>
  <line x1="28" y1="212" x2="28" y2="240" stroke="#a08c2e" stroke-width="0.5"/>
  <line x1="38" y1="212" x2="38" y2="240" stroke="#a08c2e" stroke-width="0.5"/>
  <line x1="48" y1="212" x2="48" y2="240" stroke="#a08c2e" stroke-width="0.5"/>
  <line x1="18" y1="226" x2="58" y2="226" stroke="#a08c2e" stroke-width="0.5"/>
  <!-- Signature line -->
  <line x1="260" y1="235" x2="385" y2="235" stroke="#90a4ae" stroke-width="0.5"/>
  <text x="322" y="245" font-family="Arial, sans-serif" font-size="7" fill="#90a4ae" text-anchor="middle">Nenshkrimi / Signature</text>
  <!-- SPECIMEN watermark -->
  <text x="200" y="145" font-family="Arial, sans-serif" font-size="36" fill="#c41e3a" fill-opacity="0.07" text-anchor="middle" transform="rotate(-20,200,145)" font-weight="bold">SPECIMEN</text>
</svg>