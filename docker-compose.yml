services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: docal
      POSTGRES_USER: docal
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://docal:${DB_PASSWORD:-changeme}@db:5432/docal?schema=public
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://www.doc.al}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      CERTIFICATE_ENCRYPTION_KEY: ${CERTIFICATE_ENCRYPTION_KEY}
      CRON_SECRET: ${CRON_SECRET}
      STAMLES_API_URL: http://stamles-app:3001
      STAMLES_API_KEY: ${STAMLES_API_KEY:-stamles_docal_2026_secret_key}
    depends_on:
      - db

  # STAMLES Decentralized Trust System
  # Polygon blockchain timestamping with Merkle tree batching
  # Accessible at scan.stamles.eu
  stamles-app:
    image: ${STAMLES_IMAGE:-stamles-app:latest}
    restart: always
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://docal:${DB_PASSWORD:-changeme}@db:5432/docal?schema=public
      POLYGON_RPC_URL: ${POLYGON_RPC_URL:-https://polygon-amoy.g.alchemy.com/v2/${ALCHEMY_API_KEY}}
      POLYGON_PRIVATE_KEY: ${POLYGON_PRIVATE_KEY}
      POLYGON_CONTRACT_ADDRESS: ${POLYGON_CONTRACT_ADDRESS:-0x62ab62912b89fA0aA3A1af3CF0dFAbAE3976EC85}
      API_KEY: ${STAMLES_API_KEY:-stamles_docal_2026_secret_key}
      PORT: 3001
    depends_on:
      - db

  # Nginx reverse proxy
  # www.doc.al -> app:3000
  # scan.stamles.eu -> stamles-app:3001
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    depends_on:
      - app
      - stamles-app

volumes:
  pgdata:
